name: Documentation PR Check

# This workflow validates that documentation builds successfully before PRs can be merged.
# To make this a required check, go to: Settings > Branches > Branch protection rules
# and add "Documentation PR Check" as a required status check.

on:
  pull_request:
    paths:
      - 'docs/website/**'
      - '.github/workflows/docs-*.yml'
      - 'docs/**/*.md'
    branches:
      - main
      - master
      - 'feat/**'
      - 'fix/**'
      - 'release/**'

jobs:
  check-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: docs/website/package-lock.json

      - name: Install dependencies
        working-directory: docs/website
        run: npm ci

      - name: Remove versioned docs for PR check
        working-directory: docs/website
        run: |
          # Remove versioned docs to avoid false positives during PR checks
          # Versioned docs are created during release, not during PR validation
          if [ -d "versioned_docs" ]; then
            echo "Removing versioned_docs for PR validation..."
            rm -rf versioned_docs
          fi
          if [ -f "versions.json" ] && [ "$(cat versions.json)" != "[]" ]; then
            echo "Clearing versions.json for PR validation..."
            echo "[]" > versions.json
          fi

      - name: Build and validate documentation
        working-directory: docs/website
        run: |
          echo "Building documentation (versioning disabled for PR check)..."
          npm run build
          echo "✅ Documentation build successful!"
        env:
          NODE_ENV: production
          DISABLE_VERSIONING: 'true'

      - name: Comment PR on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **Documentation build failed!**\n\nPlease fix the documentation build errors before merging this PR.\n\nCommon issues:\n- Broken markdown links\n- Missing files\n- Syntax errors in markdown\n\nCheck the workflow logs for details.'
            })

